version: '3'
services:
  backend:
    image: backend
    ports:
      - "8080:8080"
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - OTEL_EXPORTER_OTLP_INSECURE=true

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317  # This line can be removed if Jaeger is not exporting OTLP
      - OTEL_EXPORTER_OTLP_INSECURE=true
    ports:
      - "5775:5775/udp"
      - "6831:6831/udp"
      - "6832:6832/udp"
      - "5778:5778"
      - "16686:16686"
      - "14268:14268"
      - "14250:14250"
      - "9411:9411"
      - "4317:4317"  # Add this line to expose the OTLP endpoint